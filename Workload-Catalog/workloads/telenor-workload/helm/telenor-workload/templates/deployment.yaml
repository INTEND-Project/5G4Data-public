apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telenor-workload.fullname" . }}
  labels:
    {{- include "telenor-workload.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "telenor-workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "telenor-workload.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "telenor-workload.serviceAccountName" . }}
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.nginx.port }}
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
        - name: latency-exporter
          image: "{{ .Values.latencyExporter.image.repository }}:{{ .Values.latencyExporter.image.tag }}"
          imagePullPolicy: {{ .Values.latencyExporter.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - pip install --quiet -r /app/requirements.txt && python /app/latency_exporter.py
          ports:
            - containerPort: {{ .Values.latencyExporter.port }}
              name: metrics
          env:
            - name: TARGET_URL
              value: {{ .Values.loadgen.targetUrl | quote }}
            - name: MIN_RPS
              value: {{ .Values.loadgen.minRPS | quote }}
            - name: MAX_RPS
              value: {{ .Values.loadgen.maxRPS | quote }}
            - name: PATTERN
              value: {{ .Values.loadgen.pattern | quote }}
            - name: PERIOD_SECONDS
              value: {{ .Values.loadgen.periodSeconds | quote }}
            - name: METRICS_PORT
              value: {{ .Values.latencyExporter.port | quote }}
          resources:
            {{- toYaml .Values.latencyExporter.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/latency_exporter.py
              subPath: latency_exporter.py
            - name: config
              mountPath: /app/requirements.txt
              subPath: requirements.txt
      volumes:
        - name: config
          configMap:
            name: {{ include "telenor-workload.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
