# Standalone run: docker compose up --build -d
# Caddy on the host (or reverse-proxy container) should reverse_proxy to host port 18080, e.g.:
#   handle_path /openclaw-agents/* { reverse_proxy http://host.docker.internal:18080 }
#
# Attach to an existing Compose network instead of publishing a host port:
#   docker compose run --service-ports --network 5g4data-tutorial-app-network openclaw-agents-proxy
# and point Caddy at http://openclaw-agents-proxy:8080 (service name).

services:
  openclaw-agents-proxy:
    build: .
    image: openclaw-agents-proxy:local
    ports:
      - "18080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      # Registry HTTP API as seen from this container (same backend Caddy strips to for /a2a-registry/api/*)
      REGISTRY_API_BASE: http://host.docker.internal:17001
      REGISTRY_LIST_PATHS: /api/agents,/agents
      UPSTREAM_HOST: host.docker.internal
      # Until the registry stores listen_port/upstream per agent, map agent card names to host ports:
      SLUG_TO_PORT_JSON: '{"5g4data-intent-generation-agent":3011,"5g4data-intent-observations-agent":3012}'
      CACHE_TTL_MS: "5000"
      # CARD_FETCH_MAX: "24"
      # DEBUG_ROUTES: "1"
