apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "telenor-workload.fullname" . }}
  labels:
    {{- include "telenor-workload.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }
        location /health {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }
  requirements.txt: |
    aiohttp>=3.9
    prometheus_client>=0.20
  latency_exporter.py: |
{{ .Files.Get "sidecar/latency_exporter.py" | indent 4 }}
