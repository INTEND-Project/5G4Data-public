      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#e8f4fc"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Mountain / slope -->
  <polygon points="0,200 200,200 200,120 140,85 100,110 60,75 0,130" fill="#5c7a8a" stroke="#3d5566" stroke-width="2"/>
  <polygon points="0,200 110,200 65,95 0,135" fill="#f0f6fa" opacity="0.95"/>
  <!-- Avalanche path hint -->
  <path d="M 78 108 L 95 200 L 108 200 Z" fill="#ffffff" opacity="0.5"/>
  <!-- Camera / detection frame -->
  <rect x="38" y="28" width="124" height="82" rx="6" fill="none" stroke="#1a4d6e" stroke-width="3"/>
  <path d="M 38 40 H 50 M 162 40 H 150 M 38 98 H 50 M 162 98 H 150 M 38 40 V 52 M 162 40 V 52 M 38 98 V 86 M 162 98 V 86" stroke="#1a4d6e" stroke-width="3"/>
