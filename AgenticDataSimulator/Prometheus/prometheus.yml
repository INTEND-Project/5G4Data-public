global:
  scrape_interval: 5s

storage:
  tsdb:
    out_of_order_time_window: 365d

scrape_configs:
  - job_name: pushgateway
    honor_labels: true
    honor_timestamps: true
    scrape_timeout: 5s  # Specific timeout for pushgateway
    static_configs:
      - targets: ["pushgateway:9091"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pushgateway_.*'
        action: drop

