  <!-- Label: use XML entity for middle dot (ASCII-only source avoids encoding bugs) -->
  <text x="100" y="188" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#1a4d6e" text-anchor="middle">search &#183; detect</text>
