  <circle cx="100" cy="66" r="6" fill="#e85d04"/>
  <!-- Drone -->
  <g transform="translate(128, 22)">
    <line x1="0" y1="10" x2="28" y2="10" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="14" y2="20" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
