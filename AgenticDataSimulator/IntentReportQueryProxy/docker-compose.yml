services:
  intent-report-proxy:
    build: .
    network_mode: host
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3010
      - GRAPHDB_URL=http://127.0.0.1:7200
      # Fallback when Grafana does not pass repository_id
      - GRAPHDB_REPOSITORY=telenor-5g4data-simulator-demo
      # Prometheus API base on this host (direct :9090; public URL uses /prometheus prefix via Caddy)
      - PROMETHEUS_EXECUTOR_URL=http://127.0.0.1:9090
    env_file:
      - ../SimulatorController/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:3010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 